# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: opcua-kb-agent
services:
    opcua-kb-agent:
        project: .
        host: azure.ai.agent
        language: docker
        docker:
            remoteBuild: true
        config:
            container:
                resources:
                    cpu: "0.25"
                    memory: 0.5Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-4o
                    version: "2024-11-20"
                  name: gpt-4o
                  sku:
                    capacity: 30
                    name: GlobalStandard
            startupCommand: dotnet OpcUaKb.HostedAgent.dll
            toolboxes:
                - name: opcua-kb-tools
                  tools:
                    - server_label: opcua-kb-mcp
                      server_url: https://opcua-kb-sc-mcp-server.braveplant-56ae9d9d.swedencentral.azurecontainerapps.io/
                      type: mcp
infra:
    provider: bicep
    path: ./infra
